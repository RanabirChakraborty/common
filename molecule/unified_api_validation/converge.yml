---
- name: Validate Unified Downloads API Response Structure
  hosts: localhost
  gather_facts: no
  vars:
    client_id: "{{ lookup('env', 'REDHAT_PRODUCT_DOWNLOAD_CLIENT_ID') }}"
    client_secret: "{{ lookup('env', 'REDHAT_PRODUCT_DOWNLOAD_CLIENT_SECRET') }}"
    eap_versions:
      - version: '7.4'
        category: appplatform
      - version: '8.1'
        category: appplatform
  tasks:
    - name: Execute validation when production credentials are provided
      when:
        - client_id is defined and client_id | length > 0
        - client_secret is defined and client_secret | length > 0
      block:
        - name: Validate API response structure for each EAP version
          include_tasks: validate_version.yml
          loop: "{{ eap_versions }}"
          loop_control:
            loop_var: eap_version

    - name: Skip message when credentials not provided
      ansible.builtin.debug:
        msg: "Skipping Unified API validation - set UNIFIED_DOWNLOADS_API_CLIENTID and UNIFIED_DOWNLOADS_API_SECRET"
      when:
        - client_id is not defined or client_id | length == 0 or client_secret is not defined or client_secret | length == 0
