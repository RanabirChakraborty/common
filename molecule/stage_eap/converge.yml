---
- name: Converge
  hosts: localhost
  gather_facts: no
  vars:
    client_id: "{{ lookup('env', 'STAGE_JBOSSNETWORK_API_CLIENTID') }}"
    client_secret: "{{ lookup('env', 'STAGE_JBOSSNETWORK_API_SECRET') }}"
    eap_versions:
      - version: '7.4'
        zip_pattern: '[^/]*/jboss-eap-7.4.0.zip$'
      - version: '8.1'
        zip_pattern: '[^/]*/jboss-eap-8.1.0.zip$'
  tasks:
    - name: Check if staging environment is accessible
      ansible.builtin.uri:
        url: https://api.access.stage.redhat.com/downloads
        method: GET
        status_code: [200, 401, 403]
        timeout: 5
      register: staging_check
      ignore_errors: yes
      when:
        - client_id is defined and client_id | length > 0
        - client_secret is defined and client_secret | length > 0

    - name: Execute scenario if staging credentials are provided
      when:
        - client_id is defined and client_id | length > 0
        - client_secret is defined and client_secret | length > 0
        - staging_check is succeeded
      block:
        - name: Test EAP versions on staging
          include_tasks: test_stage_eap_version.yml
          loop: "{{ eap_versions }}"
          loop_control:
            loop_var: eap_version

    - name: Skip message when staging is not accessible
      ansible.builtin.debug:
        msg: "Skipping EAP staging scenario - Red Hat staging environment is not accessible (internal/VPN only)"
      when:
        - client_id is defined and client_id | length > 0
        - client_secret is defined and client_secret | length > 0
        - staging_check is failed

    - name: Skip message when credentials not provided
      ansible.builtin.debug:
        msg: "Skipping EAP staging scenario - set STAGE_JBOSSNETWORK_API_CLIENTID and STAGE_JBOSSNETWORK_API_SECRET"
      when:
        - client_id is not defined or client_id | length == 0 or client_secret is not defined or client_secret | length == 0
